<!DOCTYPE html>
<html lang="uz">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Sfatshop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body {
                  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                  background: #f5f5f5;
                  color: #222;
          }
          .header {
                  background: #2563eb;
                  color: white;
                  padding: 16px;
                  text-align: center;
                  position: sticky;
                  top: 0;
                  z-index: 100;
          }
          .header h1 { font-size: 20px; font-weight: 700; }
          .header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
          .catalog { padding: 12px; }
          .card {
                  background: white;
                  border-radius: 14px;
                  padding: 14px;
                  margin-bottom: 12px;
                  display: flex;
                  align-items: center;
                  gap: 14px;
                  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
          }
          .emoji { font-size: 40px; min-width: 56px; text-align: center; }
          .info { flex: 1; }
          .info h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
          .info .price { color: #2563eb; font-weight: 700; font-size: 16px; }
          .info .category { font-size: 11px; color: #888; margin-top: 2px; }
          .btn {
                  background: #2563eb;
                  color: white;
                  border: none;
                  padding: 8px 14px;
                  border-radius: 8px;
                  font-size: 13px;
                  cursor: pointer;
                  white-space: nowrap;
          }
          .btn:active { opacity: 0.8; }
          .cart-bar {
                  position: fixed;
                  bottom: 0; left: 0; right: 0;
                  background: #2563eb;
                  color: white;
                  padding: 14px 20px;
                  display: none;
                  justify-content: space-between;
                  align-items: center;
                  font-weight: 600;
          }
          .cart-bar.show { display: flex; }
          .order-btn {
                  background: white;
                  color: #2563eb;
                  border: none;
                  padding: 8px 18px;
                  border-radius: 8px;
                  font-weight: 700;
                  cursor: pointer;
          }
          .toast {
                  position: fixed;
                  top: 70px; left: 50%; transform: translateX(-50%);
                  background: #22c55e;
                  color: white;
                  padding: 10px 20px;
                  border-radius: 20px;
                  font-size: 14px;
                  opacity: 0;
                  transition: opacity 0.3s;
                  z-index: 999;
          }
          .toast.show { opacity: 1; }
        </style>
  </head>
  <body>

    <div class="header">
        <h1>🛍️ Sfatshop</h1>
      <p>Sifatli mahsulotlar — tez yetkazib berish</p>
    </div>div>
  
  <div class="catalog" id="catalog"></div>div>
  
  <div class="cart-bar" id="cartBar">
    <span id="cartInfo">Savat: 0 ta</span>span>
    <button class="order-btn" onclick="sendOrder()">Buyurtma berish</button>button>
  </div>div>
  
  <div class="toast" id="toast">✅ Savatga qo'shildi!</div>div>
  
  <script>
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();

      const products = [
        { id:1, name: "Avtomobil uchun osilma tutqich", price: 85000, category: "Avtomobil", emoji: "🚗" },
        { id:2, name: "Yumaloq softboks, lampa va stojka", price: 320000, category: "Fotostudiya", emoji: "💡" },
        { id:3, name: "Qo'lda qog'oz kesish (A4)", price: 45000, category: "Uy jihozlari", emoji: "✂️" },
        { id:4, name: "Yig'ma turistik stol va stul", price: 180000, category: "Sport", emoji: "⛺" },
        { id:5, name: "Yuqori bosimli avtomobil yuvish", price: 250000, category: "Avtomobil", emoji: "🚿" },
        { id:6, name: "Vintli ilgak (burg'usiz) oshxona", price: 15000, category: "Uy", emoji: "🔩" },
        { id:7, name: "Oyoq kiyim tortgich (yog'och)", price: 35000, category: "Uy", emoji: "👟" },
        { id:8, name: "Chaqaloq sochi uchun silikon cho'tka", price: 22000, category: "Bola", emoji: "👶" },
        { id:9, name: "Poyabzal uchun yopishqoq 60ml", price: 18000, category: "Uy", emoji: "👞" }
          ];

      let cart = [];

      function renderProducts() {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = products.map(p => `
                  <div class="card">
                          <div class="emoji">${p.emoji}</div>
                                  <div class="info">
                                            <h3>${p.name}</h3>
                                                      <div class="price">${p.price.toLocaleString()} so'm</div>
                                                                <div class="category">${p.category}</div>
                                                                        </div>
                                                                                <button class="btn" onclick="addToCart(${p.id})">+</button>
                                                                                      </div>
                                                                                          `).join('');
      }

      function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(c => c.id === id);
            if (existing) existing.qty++;
            else cart.push({ ...product, qty: 1 });
            updateCart();
            showToast();
      }

      function updateCart() {
            const total = cart.reduce((s, c) => s + c.qty, 0);
            const sum = cart.reduce((s, c) => s + c.price * c.qty, 0);
            document.getElementById('cartInfo').textContent = `Savat: ${total} ta | ${sum.toLocaleString()} so'm`;
            document.getElementById('cartBar').classList.toggle('show', total > 0);
      }

      function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1500);
      }

      function sendOrder() {
            const lines = cart.map(c => `${c.name} x${c.qty} = ${(c.price*c.qty).toLocaleString()} so'm`);
            const sum = cart.reduce((s,c) => s+c.price*c.qty, 0);
            const user = tg.initDataUnsafe.user;
            const name = user ? user.first_name : 'Noma\'lum';
            const msg = `🛍️ Yangi buyurtma!\n👤 ${name}\n\n${lines.join('\n')}\n\n💰 Jami: ${sum.toLocaleString()} so'm\n📞 Telefon: +998-94-428-0235`;
            tg.sendData(msg);
      }

      renderProducts();
  </script>

  </body>
</html>html>
  </script></p></h1>
  </body>
    </style></title>
  </head>
