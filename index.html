<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sfatshop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1a6fbd;
      --blue-dark: #0d5a9e;
      --blue-light: #e8f2fc;
      --orange: #f5931e;
      --orange-dark: #d97c0a;
      --orange-light: #fff4e6;
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #1a2332;
      --text-muted: #6b7a8d;
      --border: #e2e8f0;
      --shadow: 0 4px 20px rgba(26,111,189,0.10);
      --radius: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 90px;
    }
 
    /* HEADER */
    .header {
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 60%, #2389d4 100%);
      padding: 14px 16px 12px;
      position: sticky; top:0; z-index:100;
      box-shadow: 0 4px 20px rgba(13,90,158,0.25);
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .logo-wrap {
      width: 42px; height: 42px;
      background: white;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      overflow: hidden;
      flex-shrink: 0;
    }
    .logo-wrap svg { width: 32px; height: 32px; }
    .brand { flex:1; }
    .brand h1 {
      font-size: 20px; font-weight: 900; color: white; line-height: 1;
      letter-spacing: -0.3px;
    }
    .brand h1 span { color: var(--orange); }
    .brand p { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 2px; font-weight: 600; }
    .header-actions { display:flex; gap:8px; }
    .icon-btn {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15);
      border: none; border-radius: 10px;
      color: white; font-size: 16px;
      cursor: pointer; display:flex; align-items:center; justify-content:center;
      backdrop-filter: blur(10px);
    }
 
    /* SEARCH */
    .search-wrap {
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.18);
      color: white;
      font-size: 14px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      backdrop-filter: blur(10px);
      outline: none;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.6); }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px; opacity: 0.8;
    }
 
    /* CATEGORIES */
    .cats-wrap {
      padding: 14px 16px 0;
      overflow-x: auto;
      display: flex; gap: 8px;
      scrollbar-width: none;
    }
    .cats-wrap::-webkit-scrollbar { display:none; }
    .cat-btn {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: var(--card);
      color: var(--text-muted);
      font-size: 12px; font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .cat-btn.active {
      background: var(--orange);
      border-color: var(--orange);
      color: white;
      box-shadow: 0 3px 12px rgba(245,147,30,0.4);
    }
 
    /* SECTION TITLE */
    .section-title {
      padding: 14px 16px 8px;
      font-size: 15px; font-weight: 800;
      color: var(--text);
      display: flex; align-items: center; gap: 6px;
    }
    .section-title span { color: var(--blue); }
 
    /* CATALOG */
    .catalog { padding: 0 16px; }
 
    /* CARD */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: fadeUp 0.3s ease both;
      border: 1px solid var(--border);
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to { opacity:1; transform:translateY(0); }
    }
    .card-media {
      width: 100%; height: 180px;
      background: linear-gradient(135deg, var(--blue-light), var(--orange-light));
      position: relative;
      overflow: hidden;
    }
    .card-media img {
      width:100%; height:100%; object-fit:cover;
    }
    .card-media video {
      width:100%; height:100%; object-fit:cover;
    }
    .card-media .emoji-placeholder {
      width:100%; height:100%;
      display:flex; align-items:center; justify-content:center;
      font-size: 64px;
    }
    .badge {
      position: absolute; top: 10px; left: 10px;
      background: var(--orange);
      color: white; font-size: 10px; font-weight: 800;
      padding: 3px 8px; border-radius: 6px;
      letter-spacing: 0.5px;
    }
    .card-body { padding: 12px 14px 14px; }
    .card-cat {
      font-size: 10px; font-weight: 700;
      color: var(--blue); text-transform: uppercase;
      letter-spacing: 0.8px; margin-bottom: 4px;
    }
    .card-name {
      font-size: 15px; font-weight: 800;
      line-height: 1.3; margin-bottom: 10px;
      color: var(--text);
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px;
    }
    .card-price {
      font-size: 18px; font-weight: 900;
      color: var(--blue);
    }
    .card-price small {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
    }
    .qty-ctrl {
      display: flex; align-items: center; gap: 0;
      background: var(--bg); border-radius: 10px;
      overflow: hidden;
    }
    .qty-btn {
      width: 34px; height: 34px;
      background: none; border: none;
      font-size: 18px; font-weight: 800;
      cursor: pointer; color: var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Nunito', sans-serif;
      transition: background 0.15s;
    }
    .qty-btn:active { background: var(--blue-light); }
    .qty-num {
      min-width: 28px; text-align: center;
      font-size: 14px; font-weight: 800;
      color: var(--text);
    }
    .add-btn {
      width: 34px; height: 34px;
      background: var(--orange);
      border: none; border-radius: 10px;
      color: white; font-size: 20px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(245,147,30,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: 'Nunito', sans-serif;
    }
    .add-btn:active { transform: scale(0.92); }
 
    /* CART BAR */
    .cart-bar {
      position: fixed; bottom: 0; left:0; right:0;
      background: var(--blue);
      padding: 12px 16px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 -4px 20px rgba(13,90,158,0.3);
      z-index: 200;
    }
    .cart-bar.show { display: flex; animation: slideUp 0.3s ease; }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .cart-info { color: white; }
    .cart-info .cart-count { font-size: 12px; opacity: 0.8; font-weight: 600; }
    .cart-info .cart-sum { font-size: 17px; font-weight: 900; }
    .order-btn {
      background: var(--orange);
      color: white; border: none;
      padding: 11px 22px;
      border-radius: 12px;
      font-size: 14px; font-weight: 800;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      box-shadow: 0 3px 12px rgba(245,147,30,0.5);
      white-space: nowrap;
    }
 
    /* TOAST */
    .toast {
      position: fixed; top: 80px; left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: #22c55e;
      color: white; padding: 10px 20px;
      border-radius: 20px; font-size: 13px; font-weight: 700;
      opacity: 0; transition: all 0.3s;
      z-index: 999; white-space: nowrap;
      box-shadow: 0 4px 16px rgba(34,197,94,0.4);
      font-family: 'Nunito', sans-serif;
    }
    .toast.show { opacity:1; transform: translateX(-50%) translateY(0); }
 
    /* ADMIN MODAL */
    .modal-bg {
      position: fixed; inset:0;
      background: rgba(0,0,0,0.5);
      z-index: 300; display:none;
      align-items: flex-end;
      backdrop-filter: blur(4px);
    }
    .modal-bg.show { display: flex; }
    .modal {
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 20px 16px 30px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    .modal h3 {
      font-size: 18px; font-weight: 900;
      margin-bottom: 16px; color: var(--text);
      text-align: center;
    }
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 700;
      color: var(--text-muted); margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 11px 14px;
      border: 2px solid var(--border);
      border-radius: 12px; font-size: 14px;
      font-family: 'Nunito', sans-serif; font-weight: 600;
      color: var(--text); background: var(--bg);
      outline: none; transition: border 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--blue);
    }
    .form-group textarea { height: 70px; resize: none; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex:1; }
    .save-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      color: white; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 800;
      cursor: pointer; font-family: 'Nunito', sans-serif;
      margin-top: 4px;
    }
    .cancel-btn {
      width: 100%; padding: 12px;
      background: var(--bg); color: var(--text-muted);
      border: none; border-radius: 14px;
      font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: 'Nunito', sans-serif;
      margin-top: 8px;
    }
 
    .empty {
      text-align: center; padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; font-weight: 600; }
  </style>
</head>
<body>
 
<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo-wrap">
      <!-- Sfatshop logo SVG (cart icon in brand colors) -->
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 20h10l12 40h38l8-28H35" stroke="#f5931e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="48" cy="72" r="6" fill="#1a6fbd"/>
        <circle cx="68" cy="72" r="6" fill="#1a6fbd"/>
        <path d="M10 20H20" stroke="#f5931e" stroke-width="7" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="brand">
      <h1>SFAT<span>SHOP</span></h1>
      <p>Sifatli mahsulotlar • Tez yetkazib berish</p>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="openModal()" title="Mahsulot qo'shish">➕</button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" placeholder="Mahsulot qidiring..." id="searchInput" oninput="filterProducts()">
  </div>
</div>
 
<!-- CATEGORIES -->
<div class="cats-wrap" id="catsWrap"></div>
 
<!-- SECTION TITLE -->
<div class="section-title" id="sectionTitle">🔥 <span>Top</span>&nbsp;mahsulotlar</div>
 
<!-- CATALOG -->
<div class="catalog" id="catalog"></div>
 
<!-- CART BAR -->
<div class="cart-bar" id="cartBar">
  <div class="cart-info">
    <div class="cart-count" id="cartCount">0 ta mahsulot</div>
    <div class="cart-sum" id="cartSum">0 so'm</div>
  </div>
  <button class="order-btn" onclick="sendOrder()">🛒 Buyurtma berish</button>
</div>
 
<!-- TOAST -->
<div class="toast" id="toast">✅ Savatga qo'shildi!</div>
 
<!-- ADD PRODUCT MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>➕ Yangi mahsulot qo'shish</h3>
    <div class="form-group">
      <label>Mahsulot nomi *</label>
      <input type="text" id="pName" placeholder="Masalan: Avtomobil tutqichi">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Narxi (so'm) *</label>
        <input type="number" id="pPrice" placeholder="85000">
      </div>
      <div class="form-group">
        <label>Kategoriya</label>
        <select id="pCat">
          <option>Avtomobil</option>
          <option>Uy</option>
          <option>Sport</option>
          <option>Bola</option>
          <option>Fotostudiya</option>
          <option>Uy jihozlari</option>
          <option>Boshqa</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Emoji (ixtiyoriy)</label>
      <input type="text" id="pEmoji" placeholder="🚗" maxlength="4">
    </div>
    <div class="form-group">
      <label>Rasm URL (ixtiyoriy)</label>
      <input type="url" id="pImg" placeholder="https://...jpg">
    </div>
    <div class="form-group">
      <label>Video URL (ixtiyoriy)</label>
      <input type="url" id="pVideo" placeholder="https://...mp4">
    </div>
    <div class="form-group">
      <label>Badge (masalan: HIT, YANGI)</label>
      <input type="text" id="pBadge" placeholder="HIT">
    </div>
    <button class="save-btn" onclick="saveProduct()">💾 Saqlash</button>
    <button class="cancel-btn" onclick="closeModal()">Bekor qilish</button>
  </div>
</div>
 
<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
 
  let products = [
    { id:1, name:"Avtomobil uchun osilma tutqich", price:85000, category:"Avtomobil", emoji:"🚗", badge:"HIT" },
    { id:2, name:"Yumaloq softboks, lampa va stojka", price:320000, category:"Fotostudiya", emoji:"💡", badge:"TOP" },
    { id:3, name:"Qo'lda qog'oz kesish (A4)", price:45000, category:"Uy jihozlari", emoji:"✂️" },
    { id:4, name:"Yig'ma turistik stol va stul", price:180000, category:"Sport", emoji:"⛺" },
    { id:5, name:"Yuqori bosimli avtomobil yuvish", price:250000, category:"Avtomobil", emoji:"🚿", badge:"YANGI" },
    { id:6, name:"Vintli ilgak (burg'usiz) oshxona", price:15000, category:"Uy", emoji:"🔩" },
    { id:7, name:"Oyoq kiyim tortgich (yog'och)", price:35000, category:"Uy", emoji:"👟" },
    { id:8, name:"Chaqaloq sochi uchun silikon cho'tka", price:22000, category:"Bola", emoji:"👶" },
    { id:9, name:"Poyabzal uchun yopishqoq 60ml", price:18000, category:"Uy", emoji:"👞" }
  ];
 
  let cart = {};
  let activeCategory = "Barchasi";
  let searchQuery = "";
  let nextId = 10;
 
  // Categories
  function getCategories() {
    const cats = ["Barchasi", ...new Set(products.map(p => p.category))];
    return cats;
  }
 
  function renderCategories() {
    const wrap = document.getElementById('catsWrap');
    wrap.innerHTML = getCategories().map(c => `
      <button class="cat-btn ${c === activeCategory ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>
    `).join('');
  }
 
  function setCategory(cat) {
    activeCategory = cat;
    renderCategories();
    renderProducts();
    const title = document.getElementById('sectionTitle');
    title.innerHTML = cat === 'Barchasi' ? '🔥 <span>Top</span>&nbsp;mahsulotlar' : `📦 <span>${cat}</span>&nbsp;bo'limi`;
  }
 
  function filterProducts() {
    searchQuery = document.getElementById('searchInput').value.toLowerCase();
    renderProducts();
  }
 
  function getFiltered() {
    return products.filter(p => {
      const matchCat = activeCategory === "Barchasi" || p.category === activeCategory;
      const matchSearch = !searchQuery || p.name.toLowerCase().includes(searchQuery);
      return matchCat && matchSearch;
    });
  }
 
  function renderProducts() {
    const catalog = document.getElementById('catalog');
    const filtered = getFiltered();
 
    if (!filtered.length) {
      catalog.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>Mahsulot topilmadi</p></div>`;
      return;
    }
 
    catalog.innerHTML = filtered.map((p, i) => {
      const qty = cart[p.id] || 0;
      const hasMedia = p.img || p.video;
      return `
      <div class="card" style="animation-delay:${i * 0.05}s">
        ${hasMedia ? `
        <div class="card-media">
          ${p.badge ? `<div class="badge">${p.badge}</div>` : ''}
          ${p.video
            ? `<video src="${p.video}" autoplay muted loop playsinline></video>`
            : `<img src="${p.img}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=\\'emoji-placeholder\\'>${p.emoji || '📦'}</div>'">`
          }
        </div>` : p.emoji ? `
        <div class="card-media" style="height:120px">
          ${p.badge ? `<div class="badge">${p.badge}</div>` : ''}
          <div class="emoji-placeholder" style="font-size:52px">${p.emoji}</div>
        </div>` : ''}
        <div class="card-body">
          <div class="card-cat">${p.category}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-footer">
            <div class="card-price">
              ${p.price.toLocaleString()} <small>so'm</small>
            </div>
            ${qty > 0 ? `
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="changeQty(${p.id}, -1)">−</button>
              <span class="qty-num">${qty}</span>
              <button class="qty-btn" onclick="changeQty(${p.id}, 1)">+</button>
            </div>` : `
            <button class="add-btn" onclick="changeQty(${p.id}, 1)">+</button>`}
          </div>
        </div>
      </div>`;
    }).join('');
  }
 
  function changeQty(id, delta) {
    const current = cart[id] || 0;
    const newQty = current + delta;
    if (newQty <= 0) delete cart[id];
    else cart[id] = newQty;
 
    if (delta > 0 && current === 0) showToast();
    updateCart();
    renderProducts();
  }
 
  function updateCart() {
    const items = Object.entries(cart);
    const total = items.reduce((s, [,q]) => s + q, 0);
    const sum = items.reduce((s, [id, q]) => {
      const p = products.find(x => x.id == id);
      return s + (p ? p.price * q : 0);
    }, 0);
 
    document.getElementById('cartCount').textContent = `${total} ta mahsulot tanlandi`;
    document.getElementById('cartSum').textContent = `${sum.toLocaleString()} so'm`;
    document.getElementById('cartBar').classList.toggle('show', total > 0);
  }
 
  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }
 
  function sendOrder() {
    const items = Object.entries(cart);
    if (!items.length) return;
    const lines = items.map(([id, qty]) => {
      const p = products.find(x => x.id == id);
      return p ? `• ${p.name} x${qty} = ${(p.price*qty).toLocaleString()} so'm` : '';
    }).filter(Boolean);
    const sum = items.reduce((s, [id, q]) => {
      const p = products.find(x => x.id == id);
      return s + (p ? p.price * q : 0);
    }, 0);
    const user = tg?.initDataUnsafe?.user;
    const name = user ? `${user.first_name} ${user.last_name || ''}`.trim() : "Noma'lum";
    const msg = `🛍️ SFATSHOP — Yangi buyurtma!\n👤 Mijoz: ${name}\n\n${lines.join('\n')}\n\n💰 Jami: ${sum.toLocaleString()} so'm\n📞 Telefon: +998-94-428-0235`;
 
    if (tg) tg.sendData(msg);
    else { alert("Buyurtma:\n" + msg); }
  }
 
  // MODAL
  function openModal() { document.getElementById('modalBg').classList.add('show'); }
  function closeModal() {
    document.getElementById('modalBg').classList.remove('show');
    ['pName','pPrice','pEmoji','pImg','pVideo','pBadge'].forEach(id => document.getElementById(id).value = '');
  }
 
  function saveProduct() {
    const name = document.getElementById('pName').value.trim();
    const price = parseInt(document.getElementById('pPrice').value);
    if (!name || !price) { alert("Iltimos, nom va narxni kiriting!"); return; }
 
    const product = {
      id: nextId++,
      name,
      price,
      category: document.getElementById('pCat').value,
      emoji: document.getElementById('pEmoji').value || '📦',
      img: document.getElementById('pImg').value.trim() || null,
      video: document.getElementById('pVideo').value.trim() || null,
      badge: document.getElementById('pBadge').value.trim() || null,
    };
 
    products.unshift(product);
    closeModal();
    renderCategories();
    renderProducts();
    showToast();
    document.getElementById('toast').textContent = '✅ Mahsulot qo\'shildi!';
    setTimeout(() => document.getElementById('toast').textContent = '✅ Savatga qo\'shildi!', 2000);
  }
 
  // INIT
  renderCategories();
  renderProducts();
</script>
</body>
</html>
